<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer Gallery</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Travel Explorer Gallery</h1>
        <p>Discover breathtaking destinations around the world</p>
    </header>

    <!-- Filter Buttons -->
    <section class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="mountains">Mountains</button>
        <button data-filter="beaches">Beaches</button>
        <button data-filter="cities">Cities</button>
        <button data-filter="forests">Forests</button>
    </section>

    <!-- Gallery -->
    <section class="gallery">

        <!-- Mountains -->
        <div class="gallery-item mountains">
            <img src="https://images.unsplash.com/photo-1480497490787-505ec076689f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8bW91bnRhaW58ZW58MHx8MHx8fDA%3D" alt="Mountain">
            <div class="overlay">
                <h3>Swiss Alps</h3>
                <p>Mountain Adventure</p>
            </div>
        </div>

        <div class="gallery-item mountains">
            <img src="https://images.unsplash.com/photo-1585409677983-0f6c41ca9c3b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzB8fG1vdW50YWlufGVufDB8fDB8fHww" alt="Mountain">
            <div class="overlay">
                <h3>Rocky Peaks</h3>
                <p>Nature Escape</p>
            </div>
        </div>

        <!-- Beaches -->
        <div class="gallery-item beaches">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8YmVhY2h8ZW58MHx8MHx8fDA%3D" alt="Beach">
            <div class="overlay">
                <h3>Maldives</h3>
                <p>Tropical Paradise</p>
            </div>
        </div>

        <div class="gallery-item beaches">
            <img src="https://images.unsplash.com/photo-1585130401366-fe05a8d813c4?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NzR8fGJlYWNofGVufDB8fDB8fHww" alt="Beach">
            <div class="overlay">
                <h3>Sunny Coast</h3>
                <p>Relax & Explore</p>
            </div>
        </div>

        <!-- Cities -->
        <div class="gallery-item cities">
            <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8Y2l0eXxlbnwwfHwwfHx8MA%3D%3D" alt="City">
            <div class="overlay">
                <h3>Dubai</h3>
                <p>Modern Skyline</p>
            </div>
        </div>

        <div class="gallery-item cities">
            <img src="https://plus.unsplash.com/premium_photo-1672116452571-896980a801c8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y2l0eXxlbnwwfHwwfHx8MA%3D%3D" alt="City">
            <div class="overlay">
                <h3>New York</h3>
                <p>City Lights</p>
            </div>
        </div>

        <!-- Forests -->
        <div class="gallery-item forests">
            <img src="https://images.unsplash.com/photo-1473448912268-2022ce9509d8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGZvcmVzdHxlbnwwfHwwfHx8MA%3D%3D" alt="Forest">
            <div class="overlay">
                <h3>Misty Woods</h3>
                <p>Green Retreat</p>
            </div>
        </div>

        <div class="gallery-item forests">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzB8fGZvcmVzdHxlbnwwfHwwfHx8MA%3D%3D" alt="Forest">
            <div class="overlay">
                <h3>Rainforest</h3>
                <p>Wild Nature</p>
            </div>
        </div>

    </section>

    <!-- Lightbox -->
    <div class="lightbox">

        <span class="close-btn">
            <i class="fa-solid fa-xmark"></i>
        </span>

        <button class="prev-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <img src="" alt="" class="lightbox-img">

        <button class="next-btn">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div class="image-counter"></div>

    </div>


   <script src="script.js"></script>

</body>

</html>
